version: '3.9'

services:
  # ============ POSTGRES ============
  postgres:
    image: postgres:16-alpine
    container_name: aura_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aura -d aura_ai']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ REDIS ============
  redis:
    image: redis:7-alpine
    container_name: aura_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ API ============
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aura_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aura:aura_password@postgres:5432/aura_ai
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

  # ============ WEB ============
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: aura_web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    ports:
      - '3000:3000'
    depends_on:
      - api

  # ============ NGINX ============
  nginx:
    image: nginx:alpine
    container_name: aura_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
